{% extends 'rail/base.html' %}{% block content %}<h1>Уведомления</h1><form method="post">{% csrf_token %}<button>Отметить все прочитанными</button></form>{% for n in notifications %}<div class="card"><h3>{{ n.title }} {% if not n.is_read %}<span class="badge">новое</span>{% endif %}</h3><p>{{ n.message }}</p><small>{{ n.created_at }} · {{ n.get_type_display }}</small></div>{% empty %}<p>Уведомлений нет</p>{% endfor %}{% endblock %}
